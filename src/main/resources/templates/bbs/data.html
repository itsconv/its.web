<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/admin-layout}">

<head>
  <title>ITSConvergence 관리자</title>
</head>

<body>
  <div layout:fragment="page-content">
    <div class="table-wrap">
      <table>
        <thead id="dataTableHead">
          <tr>
            <th>순서</th>
            <th>제목</th>
            <th>작성자</th>
            <th>작성일시</th>
          </tr>
        </thead>
        <tbody id="dataTableBody">
          <tr th:each="row, status : ${page.content}">
            <td th:text="${page.totalElements - (page.number * page.size) - status.index}"></td>
            <td th:text="${row.title}"></td>
            <td th:text="${row.createName}"></td>
            <td th:text="${#temporals.format(row.createDate, 'yyyy-MM-dd')}"></td>
          </tr>
          <tr th:if="${page.empty}">
            <td colspan="5">조회된 데이터가 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
    <th:block th:replace="~{fragments/pagination_board :: boardPagination}"></th:block>
  </div>

  <th:block layout:fragment="scripts">
  </th:block>
</body>
</html>
