<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layouts/admin-layout}">

<head>
  <title>ITSConvergence 관리자</title>
  <link rel="stylesheet" th:href="@{/admin/css/common/detail-common.css}" href="/admin/css/common/detail-common.css" />
  <style>
    .reply-email-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 6px;
    }

    .reply-email-copy {
      width: 28px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #475569;
    }
  </style>
</head>

<body>
  <div layout:fragment="page-content" class="board-detail-page">
    <article class="board-detail-card">
      <header class="board-detail-header">
        <h4 class="board-detail-title" th:text="${detailPage.title}"></h4>
        <div class="board-detail-meta">
          <span>작성자 <strong th:text="${detailPage.createName}"></strong></span>
          <span>작성일시 <strong th:text="${detailPage.createDate != null ? #temporals.format(detailPage.createDate, 'yyyy-MM-dd HH:mm:ss') : ''}"></strong></span>
        </div>
        <div class="board-detail-meta">
          <span>관련부서 <strong th:text="${detailPage.groupName}"></strong></span>
          <span>열람일시 <strong th:text="${detailPage.lastUpdate != null ? #temporals.format(detailPage.lastUpdate, 'yyyy-MM-dd HH:mm:ss') : ''}"></strong></span>
        </div>
        <div class="board-detail-meta">
          <span>회신 E-MAIL
            <span class="reply-email-wrap">
              <strong id="replyEmail" th:text="${detailPage.email}"></strong>
              <button type="button" id="btnCopyReplyEmail" class="reply-email-copy" aria-label="이메일 복사" title="이메일 복사">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
                  <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
            </span>
          </span>
        </div>
      </header>

      <section class="board-detail-body">
        <div class="board-detail-content" th:utext="${detailPage.contents}"></div>
      </section>
    </article>

    <section class="board-detail-nav">
      <div class="nav-row">
        <span class="nav-label">이전글</span>
        <div class="nav-value">
          <a th:if="${detailPage.prevPost != null}"
             th:href="@{/admin/question/detail?id=${detailPage.prevPost.id}}"
             th:text="${detailPage.prevPost.title}"></a>
          <span th:if="${detailPage.prevPost == null}" class="nav-empty">이전글이 없습니다.</span>
        </div>
      </div>
      <div class="nav-row">
        <span class="nav-label">다음글</span>
        <div class="nav-value">
          <a th:if="${detailPage.nextPost != null}"
             th:href="@{/admin/question/detail?id=${detailPage.nextPost.id}}"
             th:text="${detailPage.nextPost.title}"></a>
          <span th:if="${detailPage.nextPost == null}" class="nav-empty">다음글이 없습니다.</span>
        </div>
      </div>
    </section>

    <div class="action-area board-detail-actions">
      <a th:href="@{/admin/question/list}" class="add-btn list-btn">목록</a>
      <button type="button" id="btnDeleteQuestion" class="add-btn">삭제</button>
    </div>
  </div>

  <th:block layout:fragment="scripts">
    <script th:inline="javascript">
      $('#btnDeleteQuestion').on('click', function() {
        if (!confirm('삭제하시겠습니까?')) return;

        const postId = /*[[${detailPage.id}]]*/ 0;

        $.ajax({
          url: `/api/question/${postId}`,
          type: 'DELETE',
          dataType: 'JSON',
        })
        .then(function(res) {
          alert("삭제되었습니다");
          window.location.href=`/admin/question/list`;
        })
        .catch(function(error){
            console.log('Ajax error :', error);
            alert(error.responseJSON.message);
        });
      });

      $('#btnCopyReplyEmail').on('click', async function() {
        const email = $('#replyEmail').text().trim();
        if (!email) return;

        try {
          await navigator.clipboard.writeText(email);
          alert('이메일이 복사되었습니다.');
        } catch (e) {
          const $input = $('<input type="text">').val(email).appendTo('body');
          $input.trigger('focus').trigger('select');
          document.execCommand('copy');
          $input.remove();
          alert('이메일이 복사되었습니다.');
        }
      });
    </script>
  </th:block>
</body>

</html>
