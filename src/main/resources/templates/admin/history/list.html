<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layouts/admin-layout}"
  th:with="pageData='history'">

<head>
  <title>ITSConvergence 관리자</title>

  <link rel="stylesheet" th:href="@{/admin/css/history/list.css}" />
</head>

<body>
  <div class="dashboard-content" layout:fragment="page-content">
    <h3 id="pageTitleMain">연혁 관리<span>연혁을 추가/수정 관리합니다.</span></h3>
    <div class="divider"></div>

    <div class="table-wrap">
      <table>
        <thead id="dataTableHead">
          <tr>
              <td>시작구간</td>
              <td>종료구간</td>
              <td>기능</td>
          </tr>
        </thead>
        <tbody id="dataTableBody">
          <tr th:each="period : ${period}">
            <td align="center" class="start-period" th:text="${period.startPeriod}"></td>
            <td align="center" class="end-period" th:text="${period.endPeriod}"></td>
            <td align="center" th:attr="data-history-id=${period.id}" >
                <button class="h18 red_s history-edit">수정</button>
                <button class="h18 blue_s history-detail-open">상세</button>
                <button class="h18 blue_s history-delete">삭제</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <div class="action-area">
        <button type="button" id="btnAddHistory" class="add-btn">
          <span class="icon"><img src="/asset/img/plus.gif" alt="" /></span>
          연혁 추가
        </button>
      </div>
    </div>

    <th:block th:replace="~{admin/history/modal :: history-modal}"></th:block>
  </div>


  <th:block layout:fragment="scripts">
    <script th:src="@{/admin/js/history/list.js}"></script>
    <script th:src="@{/admin/js/history/crud.js}"></script>
  </th:block>
</body>
</html>
