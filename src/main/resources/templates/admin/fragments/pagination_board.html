<div th:fragment="boardPagination" class="board-pagination-fragment">
  <div class="pagination">
    <form id="frmBoardPage" method="get" th:action="@{/admin/bbs/data}">
      <input type="hidden" name="page" th:value="${page.number + 1}" />
      <input type="hidden" name="size" th:value="${req.size}" />
      <input type="hidden" name="keyword" th:value="${req.keyword}" />
    </form>

    <div class="pagination-controls">
      <button type="button" class="page-arrow page-arrow-l2 page-control"
              th:disabled="${page.first}" data-page="1">
        <span class="sr-only">맨 앞 페이지</span>
      </button>
      <button type="button" class="page-arrow page-arrow-l1 page-control"
              th:disabled="${page.first}" th:attr="data-page=${page.number}">
        <span class="sr-only">이전 페이지</span>
      </button>
      <span class="page-current-box">
        <button type="button" class="page-current"
                th:text="${page.number + 1}" disabled>1</button>
      </span>
      <button type="button" class="page-arrow page-arrow-r1 page-control"
              th:disabled="${page.last}" th:attr="data-page=${page.number + 2}">
        <span class="sr-only">다음 페이지</span>
      </button>
      <button type="button" class="page-arrow page-arrow-r2 page-control"
              th:disabled="${page.last}" th:attr="data-page=${page.totalPages}">
        <span class="sr-only">맨 뒤 페이지</span>
      </button>
    </div>
  </div>
  <div class="action-area">
    <div class="action-area-left">
      <button type="button" class="h18 blue_s btn-delete-list">
        <span
          class="action-text">선택삭제</span>
      </button>
      <button type="button" class="h18 blue_s btn-copy-list">
        <span
          class="action-text">선택복사</span>
      </button>
      <button type="button" class="h18 blue_s btn-move-board">
        <span
          class="action-text">선택이동</span>
      </button>
      <button type="button" class="h18 blue_s btn-move-order">
        <span
          class="action-text">순서변경</span>
      </button>
    </div>
    <div class="action-area-middle">
      <form id="frmBbsData" method="get" th:action="@{/admin/bbs/data}">
          <!-- <input type="hidden" name="type" th:value="${req.type.name().toLowerCase()}" /> -->
          <input type="hidden" name="size" th:value="${req.size}" />
          <select class="search-type">
            <option value="TITLE">제목</option>
            <option value="CONTENT">내용</option>
            <option value="TITLE_CONTENT">제목+내용</option>
            <option value="NAME">작성자명</option>
            <option value="ID">작성자ID</option>
          </select>
          <input type="text" class="search-keyword" th:value="${req.keyword}" />
          <button type="submit" class="btn-search h18 red_s">검색</button>
      </form>
    </div>
    <div class="action-area-right">
      <button type="button" id="btnAddList" class="h18 blue_s">
        <span
          class="action-text">글쓰기</span>
      </button>
    </div>
  </div>
</div>

<script>
  $('.page-control').on('click', function() {
    const $this = $(this);

    if ($this.attr('disabled')) return;

    const $form = $('#frmBoardPage');
    const page = $this.data('page');

    $form.find('input[name="page"]').val(page);
    $form.submit();
  });
</script>
