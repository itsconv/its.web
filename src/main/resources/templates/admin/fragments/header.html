<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="header">
  <header class="header">
    <div class="header-inner">
      <a th:href="@{/admin/user/list}" class="logo">ITSConvergence</a>
      <nav class="header-nav">
        <a href="https://itsconv.com" target="_blank" class="header-link">내홈페이지</a>
        <a th:href="@{/admin/user/list}" id="adminHomeLink" class="header-link">관리자홈</a>
        <a th:href="@{/logout}" class="logout-btn">
          <span class="icon">↪</span>
          로그아웃
        </a>
      </nav>
    </div>
  </header>

  <div class="tabs">
    <a th:href="@{/admin/user/list}"
       href="/admin/user/list"
       class="tab-btn"
       th:classappend="${pageData == 'admin-list' or pageData == 'popup-list'} ? ' active' : ''">
      <span class="tab-icon"><img th:src="@{/asset/img/icon_settings.svg}" src="/asset/img/icon_settings.svg" alt="기본설정 아이콘" /></span>
      <span class="tab-label">기본설정</span>
    </a>
    <a th:href="@{/admin/bbs/data}"
       href="/admin/bbs/data"
       class="tab-btn"
       th:classappend="${pageData == 'data' or pageData == 'notice' or pageData == 'download' or pageData == 'story' or pageData == 'edit'} ? ' active' : ''">
      <span class="tab-icon"><img th:src="@{/asset/img/icon_board.svg}" src="/asset/img/icon_board.svg" alt="게시판관리 아이콘" /></span>
      <span class="tab-label">게시판관리</span>
    </a>
    <a th:href="@{/admin/history/list}"
       href="/admin/history/list"
       class="tab-btn"
       th:classappend="${pageData == 'history'} ? ' active' : ''">
      <span class="tab-icon"><img th:src="@{/asset/img/icon_history.svg}" src="/asset/img/icon_history.svg" alt="연혁관리 아이콘" /></span>
      <span class="tab-label">연혁관리</span>
    </a>
    <a th:href="@{/admin/image}"
       href="/admin/image"
       class="tab-btn tab-image"
       th:classappend="${pageData == 'image-management' or pageData == 'image-trading-room' or pageData == 'image-ai-monitoring-center' or pageData == 'image-ai-contact-center' or pageData == 'image-uc-solution'} ? ' active' : ''">
      <span class="tab-icon"><img th:src="@{/asset/img/icon_image.svg}" src="/asset/img/icon_image.svg" alt="이미지관리 아이콘" /></span>
      <span class="tab-label">이미지관리</span>
    </a>
  </div>
</th:block>
