<aside xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar" class="sidebar">

  <th:block th:if="${activeTab == 'basic'}">
    <h3 class="sidebar-title">기본설정</h3>
    <nav class="submenu">
      <a th:href="@{/admin/user/list}" class="submenu-btn"
         th:classappend="${pageData == 'admin-list'} ? 'active'">관리자설정</a>
      <a th:href="@{/admin/popup/list}" class="submenu-btn"
         th:classappend="${pageData == 'popup-list'} ? 'active'">팝업관리</a>
    </nav>
  </th:block>

  <th:block th:if="${activeTab == 'posts'}">
    <h3 class="sidebar-title">게시판관리</h3>
    <nav class="submenu">
      <a th:href="@{/admin/bbs/data}" class="submenu-btn"
         th:classappend="${#strings.equals(pageData, 'data') or #strings.equals(pageData, 'bbs-list')} ? 'active'">홍보자료</a>
      <a th:href="@{/admin/bbs/notice}" class="submenu-btn"
         th:classappend="${pageData == 'notice'} ? 'active'">공지사항</a>
      <a th:href="@{/admin/bbs/download}" class="submenu-btn"
         th:classappend="${pageData == 'download'} ? 'active'">자료실</a>
      <a th:href="@{/admin/bbs/story}" class="submenu-btn"
         th:classappend="${pageData == 'story'} ? 'active'">ITS Story</a>
    </nav>
  </th:block>

  <th:block th:if="${activeTab == 'news'}">
    <h3 class="sidebar-title">연혁관리</h3>
    <nav class="submenu">
      <a th:href="@{/admin/history/list}" class="submenu-btn"
         th:classappend="${pageData == 'history'} ? 'active'">연혁관리</a>
    </nav>
  </th:block>

  <th:block th:if="${activeTab == 'media'}">
    <h3 class="sidebar-title">이미지관리</h3>
    <nav class="submenu">
      <a th:href="@{/admin/image/trading-room}" class="submenu-btn"
         th:classappend="${pageData == 'image-trading-room'} ? 'active'">통합트레이딩룸</a>
      <a th:href="@{/admin/image/ai-monitoring-center}" class="submenu-btn"
         th:classappend="${pageData == 'image-ai-monitoring-center'} ? 'active'">AI관제센터</a>
      <a th:href="@{/admin/image/ai-contact-center}" class="submenu-btn"
         th:classappend="${pageData == 'image-ai-contact-center'} ? 'active'">AI컨텍센터</a>
      <a th:href="@{/admin/image/uc-solution}" class="submenu-btn"
         th:classappend="${pageData == 'image-uc-solution'} ? 'active'">UC솔루션</a>
    </nav>
  </th:block>

  <button type="button" id="collapseBtn" class="collapse-btn" aria-label="사이드바 접기">◀</button>
</aside>
