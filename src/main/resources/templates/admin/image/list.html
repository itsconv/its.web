<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layouts/admin-layout}">

<head>
  <title>이미지관리</title>
  <link rel="stylesheet" th:href="@{/admin/css/image/list.css}">
</head>

<body>
  <div layout:fragment="page-content">
    <div class="image-management-page">
      <div class="image-management-tabs">
        <a
          th:each="subMenu : ${imageManagementView.subMenus}"
          th:href="@{/admin/image(mainMenuCode=${imageManagementView.selectedMainMenu.code},subMenuCode=${subMenu.code})}"
          th:text="${subMenu.name}"
          th:classappend="${imageManagementView.selectedSubMenu != null and imageManagementView.selectedSubMenu.id == subMenu.id} ? ' is-active' : ''"
          class="image-management-tab"
        >2뎁스메뉴</a>
      </div>

      <div class="image-management-tabs is-secondary" th:if="${!#lists.isEmpty(imageManagementView.tabMenus)}">
        <a
          th:each="tabMenu : ${imageManagementView.tabMenus}"
          th:href="@{/admin/image(mainMenuCode=${imageManagementView.selectedMainMenu.code},subMenuCode=${imageManagementView.selectedSubMenu.code},tabMenuCode=${tabMenu.code})}"
          th:text="${tabMenu.name}"
          th:classappend="${imageManagementView.selectedTabMenu != null and imageManagementView.selectedTabMenu.id == tabMenu.id} ? ' is-active' : ''"
          class="image-management-tab"
        >탭메뉴</a>
      </div>

      <div class="image-management-panel">
        <div class="image-management-panel-header">
          <h2 class="image-management-panel-title" th:text="${imageManagementView.selectedTabMenu != null ? imageManagementView.selectedTabMenu.name : imageManagementView.selectedSubMenu.name}">이미지 관리</h2>
        </div>

        <div class="image-card-grid" th:if="${!#lists.isEmpty(imageManagementView.slots)}">
          <div class="image-card" th:each="slot : ${imageManagementView.slots}">
            <div class="image-card-preview">
              <a th:href="|${imageManagementView.frontPreviewBaseUrl}#${slot.slotCode}|" target="_blank" style="display:block;width:100%;height:100%;">
                <img th:if="${slot.thumbnailUrl() != null}" th:src="${slot.thumbnailUrl()}" th:alt="${slot.slotName}">
              </a>
              <span th:if="${slot.thumbnailUrl() == null}" th:text="${slot.slotCode}">slot-code</span>
            </div>
            <div class="image-card-body">
              <div>
                <h3 class="image-card-title" th:text="${slot.slotName}">슬롯명</h3>
              </div>
              <div class="image-card-meta">
                <div><span>가이드:</span> <strong th:text="${slot.guideSizeText() != null ? slot.guideSizeText() : '-'}">1200x800</strong></div>
              </div>
            </div>
            <button
              type="button"
              class="image-card-action js-open-image-upload"
              th:attr="data-slot-id=${slot.slotId},data-slot-name=${slot.slotName},data-guide-size=${slot.guideSizeText() != null ? slot.guideSizeText() : ''}"
            >수정</button>
          </div>
        </div>

        <div class="image-slot-empty" th:if="${#lists.isEmpty(imageManagementView.slots)}">
          등록된 이미지 슬롯이 없습니다.
        </div>
      </div>
    </div>

    <div class="image-upload-modal" id="imageUploadModal">
      <div class="image-upload-modal-dialog">
        <div class="image-upload-modal-header">
          <h3 class="image-upload-modal-title" id="imageUploadModalTitle">이미지 수정</h3>
          <button type="button" class="image-upload-modal-close js-close-image-upload" aria-label="닫기">&times;</button>
        </div>
        <div class="image-upload-modal-body">
          <label class="image-upload-dropzone" id="imageUploadDropzone">
            <input type="file" id="imageUploadInput" accept="image/*">
            <div class="image-upload-dropzone-text" id="imageUploadDropzoneText">
              <strong>이미지를 드래그해서 올리거나 클릭해서 선택하세요.</strong>
              <span>PNG, JPG, JPEG, WEBP 파일을 업로드할 수 있습니다.</span>
            </div>
          </label>

          <img class="image-upload-preview" id="imageUploadPreview" alt="업로드 미리보기">

          <div class="image-upload-guide">
            <div>가이드 사이즈: <strong id="imageUploadGuideSize">-</strong></div>
          </div>
        </div>
        <div class="image-upload-modal-footer">
          <button type="button" class="image-upload-button js-close-image-upload">취소</button>
          <button type="button" class="image-upload-button is-primary" id="imageUploadSubmitButton">수정</button>
        </div>
      </div>
    </div>
    <th:block layout:fragment="scripts">
      <script th:src="@{/admin/js/image/list.js}"></script>
    </th:block>
  </div>
</body>
</html>
