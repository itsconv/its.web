<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layouts/admin-layout}">

<head>
  <title>이미지관리</title>
  <style>
    .image-management-page {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px 0;
      max-width: 1640px;
      color: #1f2937;
    }

    .image-management-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .image-management-tabs.is-secondary {
      padding-top: 4px;
    }

    .image-management-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .image-management-tab.is-active {
      border-color: #4999de;
      background: #4999de;
      color: #fff;
    }

    .image-management-panel {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }

    .image-management-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .image-management-panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .image-card-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .image-card {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
      height: 100%;
      color: inherit;
      text-decoration: none;
    }

    .image-card-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 180px;
      background:
        linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
      border-bottom: 1px solid #e5e7eb;
    }

    .image-card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-card-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 16px 0;
      min-height: 92px;
    }

    .image-card-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .image-card-subtitle {
      display: none;
    }

    .image-card-meta {
      display: grid;
      gap: 6px;
      color: #374151;
      font-size: 13px;
    }

    .image-card-meta span {
      color: #6b7280;
    }

    .image-card-action {
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 0 0 14px 14px;
      background: #4999de;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .image-slot-empty {
      padding: 24px;
      color: #6b7280;
    }

    .image-upload-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.5);
      z-index: 1000;
    }

    .image-upload-modal.is-open {
      display: flex;
    }

    .image-upload-modal-dialog {
      width: 100%;
      max-width: 560px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.25);
      overflow: hidden;
    }

    .image-upload-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .image-upload-modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .image-upload-modal-close {
      border: 0;
      background: transparent;
      color: #6b7280;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .image-upload-modal-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .image-upload-dropzone {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      border: 2px dashed #bfdbfe;
      border-radius: 16px;
      background: #f8fbff;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .image-upload-dropzone.is-dragover {
      border-color: #4999de;
      background: #eef6fd;
    }

    .image-upload-dropzone input {
      display: none;
    }

    .image-upload-dropzone-text {
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: #374151;
      font-size: 14px;
      font-weight: 600;
    }

    .image-upload-dropzone-text strong {
      color: #111827;
      font-size: 16px;
    }

    .image-upload-preview {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .image-upload-preview.is-visible {
      display: block;
    }

    .image-upload-guide {
      color: #6b7280;
      font-size: 13px;
    }

    .image-upload-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 20px 20px;
    }

    .image-upload-button {
      min-width: 110px;
      height: 42px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .image-upload-button.is-primary {
      border-color: #4999de;
      background: #4999de;
      color: #fff;
    }
  </style>
</head>

<body>
  <div layout:fragment="page-content">
    <div class="image-management-page">
      <div class="image-management-tabs">
        <a
          th:each="subMenu : ${imageManagementView.subMenus}"
          th:href="@{/admin/image(mainMenuCode=${imageManagementView.selectedMainMenu.code},subMenuCode=${subMenu.code})}"
          th:text="${subMenu.name}"
          th:classappend="${imageManagementView.selectedSubMenu != null and imageManagementView.selectedSubMenu.id == subMenu.id} ? ' is-active' : ''"
          class="image-management-tab"
        >2뎁스메뉴</a>
      </div>

      <div class="image-management-tabs is-secondary" th:if="${!#lists.isEmpty(imageManagementView.tabMenus)}">
        <a
          th:each="tabMenu : ${imageManagementView.tabMenus}"
          th:href="@{/admin/image(mainMenuCode=${imageManagementView.selectedMainMenu.code},subMenuCode=${imageManagementView.selectedSubMenu.code},tabMenuCode=${tabMenu.code})}"
          th:text="${tabMenu.name}"
          th:classappend="${imageManagementView.selectedTabMenu != null and imageManagementView.selectedTabMenu.id == tabMenu.id} ? ' is-active' : ''"
          class="image-management-tab"
        >탭메뉴</a>
      </div>

      <div class="image-management-panel">
        <div class="image-management-panel-header">
          <h2 class="image-management-panel-title" th:text="${imageManagementView.selectedTabMenu != null ? imageManagementView.selectedTabMenu.name : imageManagementView.selectedSubMenu.name}">이미지 관리</h2>
        </div>

        <div class="image-card-grid" th:if="${!#lists.isEmpty(imageManagementView.slots)}">
          <div class="image-card" th:each="slot : ${imageManagementView.slots}">
            <div class="image-card-preview">
              <a th:href="${slot.landingUrl()}" target="_blank" style="display:block;width:100%;height:100%;">
                <img th:if="${slot.thumbnailUrl() != null}" th:src="${slot.thumbnailUrl()}" th:alt="${slot.slotName}">
              </a>
              <span th:if="${slot.thumbnailUrl() == null}" th:text="${slot.slotCode}">slot-code</span>
            </div>
            <div class="image-card-body">
              <div>
                <h3 class="image-card-title" th:text="${slot.slotName}">슬롯명</h3>
              </div>
              <div class="image-card-meta">
                <div><span>가이드:</span> <strong th:text="${slot.guideSizeText() != null ? slot.guideSizeText() : '-'}">1200x800</strong></div>
              </div>
            </div>
            <button
              type="button"
              class="image-card-action js-open-image-upload"
              th:attr="data-slot-id=${slot.slotId},data-slot-name=${slot.slotName},data-guide-size=${slot.guideSizeText() != null ? slot.guideSizeText() : ''}"
            >수정</button>
          </div>
        </div>

        <div class="image-slot-empty" th:if="${#lists.isEmpty(imageManagementView.slots)}">
          등록된 이미지 슬롯이 없습니다.
        </div>
      </div>
    </div>

    <div class="image-upload-modal" id="imageUploadModal">
      <div class="image-upload-modal-dialog">
        <div class="image-upload-modal-header">
          <h3 class="image-upload-modal-title" id="imageUploadModalTitle">이미지 수정</h3>
          <button type="button" class="image-upload-modal-close js-close-image-upload" aria-label="닫기">&times;</button>
        </div>
        <div class="image-upload-modal-body">
          <label class="image-upload-dropzone" id="imageUploadDropzone">
            <input type="file" id="imageUploadInput" accept="image/*">
            <div class="image-upload-dropzone-text" id="imageUploadDropzoneText">
              <strong>이미지를 드래그해서 올리거나 클릭해서 선택하세요.</strong>
              <span>PNG, JPG, JPEG, WEBP 파일을 업로드할 수 있습니다.</span>
            </div>
          </label>

          <img class="image-upload-preview" id="imageUploadPreview" alt="업로드 미리보기">

          <div class="image-upload-guide">
            <div>가이드 사이즈: <strong id="imageUploadGuideSize">-</strong></div>
          </div>
        </div>
        <div class="image-upload-modal-footer">
          <button type="button" class="image-upload-button js-close-image-upload">취소</button>
          <button type="button" class="image-upload-button is-primary" id="imageUploadSubmitButton">수정</button>
        </div>
      </div>
    </div>
    <th:block layout:fragment="scripts">
      <script th:src="@{/admin/js/image-management.js}"></script>
    </th:block>
  </div>
</body>
</html>
