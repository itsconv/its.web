<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layouts/admin-layout}">

<head>
  <title>ITSConvergence 관리자</title>
  <link rel="stylesheet" th:href="@{/admin/css/bbs/gallery.css}" href="/admin/css/bbs/gallery.css" />
</head>

<body>
  <div layout:fragment="page-content" class="board-gallery-page">
    <div class="table-wrap">
      <div class="board-gallery-toolbar">
        <label for="checkAllItem">
          <input type="checkbox" id="checkAllItem" />
          전체선택
        </label>
      </div>

      <div id="dataTableBody" class="board-gallery-grid" th:if="${!boardPage.empty}">
        <article th:each="row, status : ${boardPage.content}" class="board-gallery-card">
          <div class="board-gallery-thumb">
            <img th:if="${row.thumbnailFileId != null}"
                 th:src="@{/api/file/view/{id}(id=${row.thumbnailFileId})}"
                 th:alt="${row.title}" />
            <div th:if="${row.thumbnailFileId == null}" class="board-gallery-thumb-empty">NO IMAGE</div>
          </div>

          <div class="board-gallery-body">
            <div class="board-gallery-meta">
              <label class="board-gallery-check">
                <input
                  type="checkbox"
                  class="check-item"
                  th:attr="data-board-id=${row.id},
                           data-board-order=${row.sortOrder},
                           data-board-idx=${status.index + 1},
                           data-board-title=${row.title}" />
                선택
              </label>

              <div class="board-gallery-badges">
                <span class="board-badge badge-new"
                      th:if="${(boardPage.first and status.index == 0) or (row.createDate != null and row.createDate.isAfter(T(java.time.LocalDateTime).now().minusDays(7)))}">
                  NEW
                </span>
                <span class="board-badge badge-hot"
                      th:if="${row.viewCount != null and row.viewCount >= 20}">
                  HOT
                </span>
              </div>
            </div>

            <span th:text="${row.title}" th:attr="data-board-id=${row.id}" class="board-title board-gallery-title"></span>

            <div class="board-gallery-footer">
              <span th:text="${row.createName}"></span>
              <span th:text="${#temporals.format(row.createDate, 'yyyy-MM-dd')}"></span>
            </div>
          </div>
        </article>
      </div>

      <div th:if="${boardPage.empty}" class="board-gallery-empty">
        조회된 데이터가 없습니다.
      </div>
    </div>

    <!--공통 페이징 -->
    <th:block th:with="
      paginationPage=${boardPage},
      paginationAction=@{/admin/bbs/story},
      paginationFormId='frmAdminBoardPage',
      paginationReq=${boardRequest}">
      <th:block th:replace="~{admin/fragments/pagination_board :: boardPagination}"></th:block>
    </th:block>

    <th:block th:replace="~{admin/bbs/modal :: bbs-modal}"></th:block>
  </div>

  <th:block layout:fragment="scripts">

  </th:block>
</body>
</html>
